<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Protocol</title>
<meta name="theme-color" content="#0A0A0A">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0A0A0A;
  --bg-card:#111111;
  --bg-input:#0A0A0A;
  --border:#222222;
  --border-focus:#0066FF;
  --accent:#0066FF;
  --accent-hover:#0052cc;
  --accent-glow:rgba(0,102,255,.15);
  --text:#F5F5F5;
  --text2:#a0a0a0;
  --text3:#555555;
  --red:#FF4500;
  --red-bg:rgba(255,69,0,.08);
  --green:#10b981;
  --green-bg:rgba(16,185,129,.08);
  --amber:#f59e0b;
  --amber-bg:rgba(245,158,11,.08);
  --font-display:'JetBrains Mono',monospace;
  --font-body:'Outfit',system-ui,sans-serif;
  --radius:8px;
  --radius-sm:6px;
  --shadow-sm:0 0 0 1px var(--border);
  --shadow-md:0 4px 24px rgba(0,0,0,.3);
  --shadow-lg:0 12px 48px rgba(0,0,0,.4);
}

html{height:100%}
body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.6;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

/* Background grid */
body::before{
  content:'';
  position:fixed;
  inset:0;
  opacity:.4;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.03) 1px, transparent 0);
  background-size:32px 32px;
  pointer-events:none;
  z-index:0;
}

.auth-container{
  width:100%;
  max-width:400px;
  position:relative;
  z-index:1;
}

/* Logo */
.auth-header{
  text-align:center;
  margin-bottom:40px;
}
.auth-header h1{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:600;
  color:var(--text);
  letter-spacing:3px;
  line-height:1.1;
  text-transform:uppercase;
}
.auth-header p{
  font-size:15px;
  color:var(--text2);
  margin-top:8px;
  font-weight:400;
}

/* Card */
.auth-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px;
  box-shadow:var(--shadow-md);
  animation:fadeIn .4s ease;
  backdrop-filter:blur(20px);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Tabs */
.auth-tabs{
  display:flex;
  gap:0;
  margin-bottom:28px;
  border-bottom:1px solid var(--border);
}
.auth-tab{
  flex:1;
  padding:12px 0;
  text-align:center;
  font-size:14px;
  font-weight:500;
  color:var(--text3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all .2s;
}
.auth-tab.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}
.auth-tab:hover:not(.active){
  color:var(--text2);
}

/* Forms */
.auth-form{display:none}
.auth-form.active{display:block;animation:formSlide .25s ease}
@keyframes formSlide{from{opacity:0}to{opacity:1}}

.form-group{margin-bottom:20px}
.form-group label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text);
  margin-bottom:6px;
}
.form-group input{
  width:100%;
  padding:11px 14px;
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:var(--font-body);
  font-size:15px;
  outline:none;
  transition:border .2s,box-shadow .2s;
}
.form-group input:focus{
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px var(--accent-glow);
  background:#fff;
}
.form-group input::placeholder{color:var(--text3)}

/* Password toggle */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);
  padding:4px;display:flex;align-items:center;transition:color .2s;
}
.pw-toggle:hover{color:var(--text2)}
.pw-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Strength bar */
.strength{display:flex;gap:4px;margin-top:8px;align-items:center}
.strength-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.strength-bar.on.weak{background:var(--red)}
.strength-bar.on.med{background:var(--amber)}
.strength-bar.on.strong{background:var(--green)}
.strength-lbl{font-size:11px;font-weight:500;margin-left:8px;min-width:50px;text-align:right}
.strength-lbl.weak{color:var(--red)}
.strength-lbl.med{color:var(--amber)}
.strength-lbl.strong{color:var(--green)}

/* Submit button */
.auth-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:var(--radius-sm);
  background:var(--accent);
  color:#fff;
  font-family:var(--font-body);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:4px;
}
.auth-btn:hover{background:var(--accent-hover);box-shadow:0 2px 12px var(--accent-glow)}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-btn:disabled:hover{background:var(--accent);box-shadow:none}
.auth-btn .spin{
  display:none;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
}
.auth-btn.loading .spin{display:block}
.auth-btn.loading .label{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.auth-error{
  background:var(--red-bg);
  border:1px solid rgba(192,57,43,.15);
  color:var(--red);
  font-size:13px;
  padding:10px 14px;
  border-radius:var(--radius-sm);
  margin-bottom:16px;
  display:none;
  animation:fadeIn .2s ease;
}
.auth-error.show{display:block}

/* Remember me */
.remember-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:20px;
}
.remember-row input[type="checkbox"]{
  width:16px;height:16px;
  accent-color:var(--accent);
  cursor:pointer;
}
.remember-row label{
  font-size:13px;
  color:var(--text2);
  cursor:pointer;
  margin:0;
}

/* Footer */
.auth-footer{
  text-align:center;
  margin-top:32px;
  font-size:13px;
  color:var(--text3);
}
.auth-footer a{color:var(--accent);text-decoration:none;font-weight:500}
.auth-footer a:hover{text-decoration:underline}

/* Mobile */
@media(max-width:480px){
  body{padding:16px;align-items:flex-start;padding-top:48px}
  .auth-card{padding:24px 20px}
  .auth-header h1{font-size:28px}
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-header">
    <h1>Protocol</h1>
    <p>Track your performance. Own your data.</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showForm('login')">Sign in</div>
      <div class="auth-tab" onclick="showForm('signup')">Create account</div>
    </div>

    <!-- Login -->
    <form id="form-login" class="auth-form active" onsubmit="return handleLogin(event)">
      <div class="auth-error" id="login-error"></div>
      <div class="form-group">
        <label for="login-email">Email or username</label>
        <input type="text" id="login-email" placeholder="you@example.com" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="login-pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-pw" placeholder="Your password" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="login-remember">
        <label for="login-remember">Remember me</label>
      </div>
      <button type="submit" class="auth-btn" id="login-btn">
        <span class="spin"></span>
        <span class="label">Sign in</span>
      </button>
    </form>

    <!-- Signup -->
    <form id="form-signup" class="auth-form" onsubmit="return handleSignup(event)">
      <div class="auth-error" id="signup-error"></div>
      <div class="form-group">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="signup-user">Username</label>
        <input type="text" id="signup-user" placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="signup-pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="signup-pw" placeholder="At least 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw(this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength" id="strength-wrap" style="display:none">
          <div class="strength-bar" id="sb1"></div>
          <div class="strength-bar" id="sb2"></div>
          <div class="strength-bar" id="sb3"></div>
          <span class="strength-lbl" id="strength-lbl"></span>
        </div>
      </div>
      <div class="form-group">
        <label for="signup-pw2">Confirm password</label>
        <input type="password" id="signup-pw2" placeholder="Confirm your password" autocomplete="new-password">
      </div>
      <button type="submit" class="auth-btn" id="signup-btn">
        <span class="spin"></span>
        <span class="label">Create account</span>
      </button>
    </form>
  </div>

  <div class="auth-footer">
    <p>Free &middot; Open Source &middot; Your data stays on your machine</p>
  </div>
</div>

<script>
// Redirect if already logged in
if (localStorage.getItem('protocol_token')) {
  window.location.href = '/';
}

// Pre-fill remembered email
const remembered = localStorage.getItem('protocol_remember_email');
if (remembered) {
  document.getElementById('login-email').value = remembered;
  document.getElementById('login-remember').checked = true;
}

function showForm(form) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (form === 'login' && i === 0) || (form === 'signup' && i === 1));
  });
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('form-' + form).classList.add('active');
  document.querySelectorAll('.auth-error').forEach(e => { e.classList.remove('show'); e.textContent = ''; });
}

function togglePw(btn) {
  const input = btn.previousElementSibling;
  const isPw = input.type === 'password';
  input.type = isPw ? 'text' : 'password';
  btn.innerHTML = isPw
    ? '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function checkStrength(pw) {
  const wrap = document.getElementById('strength-wrap');
  if (!pw) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';

  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;

  const cls = score <= 1 ? 'weak' : score === 2 ? 'med' : 'strong';
  const label = score <= 1 ? 'Weak' : score === 2 ? 'Medium' : 'Strong';

  ['sb1','sb2','sb3'].forEach((id, i) => {
    const bar = document.getElementById(id);
    bar.className = 'strength-bar' + (i < score ? ' on ' + cls : '');
  });
  const lbl = document.getElementById('strength-lbl');
  lbl.textContent = label;
  lbl.className = 'strength-lbl ' + cls;
}

function showError(formId, msg) {
  const el = document.getElementById(formId + '-error');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const remember = document.getElementById('login-remember').checked;

  if (!email || !pw) { showError('login', 'Please fill in all fields.'); return false; }

  setLoading('login-btn', true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password: pw }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      showError('login', data.error || 'Invalid credentials.');
      setLoading('login-btn', false);
      return false;
    }
    localStorage.setItem('protocol_token', data.token);
    localStorage.setItem('protocol_user', JSON.stringify(data.user));
    if (remember) localStorage.setItem('protocol_remember_email', email);
    else localStorage.removeItem('protocol_remember_email');
    window.location.href = '/';
  } catch (err) {
    showError('login', 'Connection error. Is the server running?');
    setLoading('login-btn', false);
  }
  return false;
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const username = document.getElementById('signup-user').value.trim();
  const pw = document.getElementById('signup-pw').value;
  const pw2 = document.getElementById('signup-pw2').value;

  if (!name || !email || !username || !pw) { showError('signup', 'Please fill in all fields.'); return false; }
  if (!email.includes('@')) { showError('signup', 'Please enter a valid email.'); return false; }
  if (username.length < 3) { showError('signup', 'Username must be at least 3 characters.'); return false; }
  if (pw.length < 6) { showError('signup', 'Password must be at least 6 characters.'); return false; }
  if (pw !== pw2) { showError('signup', 'Passwords do not match.'); return false; }

  setLoading('signup-btn', true);
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, email, username, password: pw }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      showError('signup', data.error || 'Could not create account.');
      setLoading('signup-btn', false);
      return false;
    }
    localStorage.setItem('protocol_token', data.token);
    localStorage.setItem('protocol_user', JSON.stringify(data.user));
    window.location.href = '/';
  } catch (err) {
    showError('signup', 'Connection error. Is the server running?');
    setLoading('signup-btn', false);
  }
  return false;
}

// Enter key navigation
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('login-pw').focus(); }
});
document.getElementById('signup-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('signup-email').focus(); }
});
document.getElementById('signup-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('signup-user').focus(); }
});
document.getElementById('signup-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('signup-pw').focus(); }
});
document.getElementById('signup-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('signup-pw2').focus(); }
});
</script>
</body>
</html>
