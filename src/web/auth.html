<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Protocol</title>
<meta name="theme-color" content="#F5F0EA">
<link href="https://fonts.googleapis.com/css2?family=Tiempos+Text:wght@400;500&family=Styrene+A:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5F0EA;
  --bg-card:#FFFFFF;
  --bg-input:#F5F0EA;
  --border:#E8E0D6;
  --border-focus:#D4A574;
  --text:#1A1915;
  --text-2:#6B6560;
  --text-3:#9B9590;
  --accent:#D4A574;
  --accent-hover:#C4915E;
  --accent-bg:rgba(212,165,116,.08);
  --red:#C0392B;
  --red-bg:rgba(192,57,43,.06);
  --green:#27AE60;
  --green-bg:rgba(39,174,96,.06);
  --radius:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow-md:0 4px 24px rgba(0,0,0,.06);
  --shadow-lg:0 12px 48px rgba(0,0,0,.08);
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  font-size:15px;
  line-height:1.6;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  min-height:100%;
}

/* ── Auth container ──────────────────────────────── */
.auth-container{
  width:100%;
  max-width:400px;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Logo ──────────────────────────────────────────── */
.auth-logo{
  text-align:center;
  margin-bottom:36px;
}
.auth-logo-icon{
  width:48px;
  height:48px;
  border-radius:14px;
  background:var(--text);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-bottom:16px;
}
.auth-logo-icon svg{
  width:26px;
  height:26px;
  fill:none;
  stroke:var(--bg);
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.auth-logo h1{
  font-family:'DM Sans',sans-serif;
  font-size:22px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-.3px;
}
.auth-logo p{
  font-size:14px;
  color:var(--text-3);
  margin-top:4px;
}

/* ── Card ──────────────────────────────────────────── */
.auth-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 28px;
  box-shadow:var(--shadow-md);
}

/* ── Tabs ──────────────────────────────────────────── */
.auth-tabs{
  display:flex;
  gap:0;
  margin-bottom:28px;
  border-bottom:1px solid var(--border);
}
.auth-tab{
  flex:1;
  padding:12px 0;
  text-align:center;
  font-size:14px;
  font-weight:500;
  color:var(--text-3);
  cursor:pointer;
  transition:all .2s;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.auth-tab.active{
  color:var(--text);
  border-bottom-color:var(--text);
}
.auth-tab:not(.active):hover{
  color:var(--text-2);
}

/* ── Forms ──────────────────────────────────────────── */
.auth-form{display:none}
.auth-form.active{display:block;animation:formSlide .25s ease}
@keyframes formSlide{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}

.form-group{margin-bottom:20px}
.form-group label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text);
  margin-bottom:6px;
}
.form-group input{
  width:100%;
  padding:11px 14px;
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:inherit;
  font-size:15px;
  outline:none;
  transition:border .2s,box-shadow .2s;
}
.form-group input:focus{
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px rgba(212,165,116,.12);
  background:#fff;
}
.form-group input::placeholder{color:var(--text-3)}

/* ── Password ──────────────────────────────────────── */
.pw-wrapper{position:relative}
.pw-wrapper input{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text-3);
  padding:4px;display:flex;align-items:center;transition:color .2s;
}
.pw-toggle:hover{color:var(--text-2)}
.pw-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── Strength ──────────────────────────────────────── */
.pw-strength{display:flex;gap:4px;margin-top:8px;align-items:center}
.pw-strength-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.pw-strength-bar.filled.weak{background:var(--red)}
.pw-strength-bar.filled.medium{background:#E67E22}
.pw-strength-bar.filled.strong{background:var(--green)}
.pw-strength-label{font-size:11px;font-weight:600;margin-left:8px;min-width:52px;text-align:right}
.pw-strength-label.weak{color:var(--red)}
.pw-strength-label.medium{color:#E67E22}
.pw-strength-label.strong{color:var(--green)}

/* ── Button ──────────────────────────────────────── */
.auth-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:var(--radius-sm);
  background:var(--text);
  color:var(--bg);
  font-family:inherit;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:4px;
}
.auth-btn:hover{background:#2A2A25;box-shadow:var(--shadow-sm)}
.auth-btn:active{transform:scale(.99)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-btn:disabled:hover{background:var(--text);box-shadow:none}
.auth-btn .spinner{
  display:none;width:16px;height:16px;
  border:2px solid rgba(245,240,234,.3);border-top-color:var(--bg);
  border-radius:50%;animation:spin .6s linear infinite;
}
.auth-btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error ──────────────────────────────────────── */
.auth-error{
  display:none;
  background:var(--red-bg);
  border:1px solid rgba(192,57,43,.12);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  margin-bottom:18px;
  font-size:13px;
  color:var(--red);
}
.auth-error.visible{display:block;animation:errorIn .2s ease}
@keyframes errorIn{from{opacity:0}to{opacity:1}}

/* ── Remember ──────────────────────────────────────── */
.remember-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:20px;margin-top:-4px;
}
.remember-row input[type="checkbox"]{
  width:16px;height:16px;accent-color:var(--text);cursor:pointer;flex-shrink:0;
}
.remember-row label{
  margin:0;font-size:13px;color:var(--text-2);cursor:pointer;
}

/* ── Footer ──────────────────────────────────────── */
.auth-footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:var(--text-3);
}

/* ── Responsive ──────────────────────────────────── */
@media(max-width:460px){
  .auth-card{padding:24px 20px;border-radius:var(--radius-sm)}
  .auth-logo{margin-bottom:28px}
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Protocol</h1>
    <p>Track your performance, protect your health.</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Sign in</div>
      <div class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Create account</div>
    </div>

    <!-- Sign In -->
    <form id="form-login" class="auth-form active" onsubmit="handleLogin(event)">
      <div id="login-error" class="auth-error"></div>

      <div class="form-group">
        <label for="login-identity">Email or username</label>
        <input type="text" id="login-identity" placeholder="you@email.com" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="pw-wrapper">
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePassword('login-password',this)" aria-label="Show password">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="login-remember">
        <label for="login-remember">Remember me</label>
      </div>

      <button type="submit" class="auth-btn" id="login-btn">
        <span class="spinner"></span>
        <span class="btn-text">Continue</span>
      </button>
    </form>

    <!-- Sign Up -->
    <form id="form-signup" class="auth-form" onsubmit="handleSignup(event)">
      <div id="signup-error" class="auth-error"></div>

      <div class="form-group">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" placeholder="Your name" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@email.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <div class="pw-wrapper">
          <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" required oninput="updateStrength()">
          <button type="button" class="pw-toggle" onclick="togglePassword('signup-password',this)" aria-label="Show password">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength" style="display:none">
          <div class="pw-strength-bar" id="str-1"></div>
          <div class="pw-strength-bar" id="str-2"></div>
          <div class="pw-strength-bar" id="str-3"></div>
          <span class="pw-strength-label" id="str-label"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-confirm">Confirm password</label>
        <div class="pw-wrapper">
          <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePassword('signup-confirm',this)" aria-label="Show password">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="signup-btn">
        <span class="spinner"></span>
        <span class="btn-text">Create account</span>
      </button>
    </form>
  </div>

  <div class="auth-footer">
    Your data stays on your machine. Always.
  </div>
</div>

<script>
if(localStorage.getItem('protocol_token'))window.location.replace('/');
const remembered=localStorage.getItem('protocol_remember');
if(remembered){document.getElementById('login-identity').value=remembered;document.getElementById('login-remember').checked=true}
setTimeout(()=>document.getElementById('login-identity').focus(),100);

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  const form=document.getElementById('form-'+tab);
  form.classList.add('active');
  document.querySelectorAll('.auth-error').forEach(e=>{e.classList.remove('visible');e.textContent=''});
  setTimeout(()=>{const inp=form.querySelector('input');if(inp)inp.focus()},50);
}

function togglePassword(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.innerHTML=show
    ?'<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    :'<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function updateStrength(){
  const pw=document.getElementById('signup-password').value;
  const c=document.getElementById('pw-strength');
  const bars=[document.getElementById('str-1'),document.getElementById('str-2'),document.getElementById('str-3')];
  const lbl=document.getElementById('str-label');
  if(!pw){c.style.display='none';return}
  c.style.display='flex';
  let s=0;
  if(pw.length>=6)s++;if(pw.length>=10)s++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;
  if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  let level,cls;
  if(s<=1){level='Weak';cls='weak'}else if(s<=3){level='Medium';cls='medium'}else{level='Strong';cls='strong'}
  const fill=s<=1?1:s<=3?2:3;
  bars.forEach((b,i)=>b.className='pw-strength-bar'+(i<fill?' filled '+cls:''));
  lbl.textContent=level;lbl.className='pw-strength-label '+cls;
}

function showError(t,m){const e=document.getElementById(t+'-error');e.textContent=m;e.classList.add('visible')}
function clearError(t){const e=document.getElementById(t+'-error');e.classList.remove('visible');e.textContent=''}
function setLoading(id,on){const b=document.getElementById(id);b.classList.toggle('loading',on);b.disabled=on}

async function authApi(path,body){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();if(!r.ok)throw new Error(d.error||'Something went wrong');return d;
}

async function handleLogin(e){
  e.preventDefault();clearError('login');
  const id=document.getElementById('login-identity').value.trim();
  const pw=document.getElementById('login-password').value;
  const rem=document.getElementById('login-remember').checked;
  if(!id){showError('login','Email or username is required');return}
  if(!pw){showError('login','Password is required');return}
  if(rem)localStorage.setItem('protocol_remember',id);else localStorage.removeItem('protocol_remember');
  setLoading('login-btn',true);
  try{
    const payload=id.includes('@')?{email:id,password:pw}:{username:id,password:pw};
    const d=await authApi('/api/auth/login',payload);
    localStorage.setItem('protocol_token',d.token);
    localStorage.setItem('protocol_user',JSON.stringify(d.user));
    window.location.replace('/');
  }catch(err){showError('login',err.message)}finally{setLoading('login-btn',false)}
}

async function handleSignup(e){
  e.preventDefault();clearError('signup');
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const user=document.getElementById('signup-username').value.trim();
  const pw=document.getElementById('signup-password').value;
  const confirm=document.getElementById('signup-confirm').value;
  if(!email||!email.includes('@')){showError('signup','Please enter a valid email');return}
  if(!user||user.length<3){showError('signup','Username must be at least 3 characters');return}
  if(!/^[a-zA-Z0-9_]+$/.test(user)){showError('signup','Username: letters, numbers, underscores only');return}
  if(!pw||pw.length<6){showError('signup','Password must be at least 6 characters');return}
  if(pw!==confirm){showError('signup','Passwords do not match');return}
  setLoading('signup-btn',true);
  try{
    const d=await authApi('/api/auth/signup',{email,username:user,password:pw,name:name||null});
    localStorage.setItem('protocol_token',d.token);
    localStorage.setItem('protocol_user',JSON.stringify(d.user));
    window.location.replace('/');
  }catch(err){showError('signup',err.message)}finally{setLoading('signup-btn',false)}
}

document.querySelectorAll('.auth-form input').forEach(inp=>{
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const form=inp.closest('form');
      const inputs=Array.from(form.querySelectorAll('input:not([type="checkbox"])'));
      const i=inputs.indexOf(inp);
      if(i<inputs.length-1)inputs[i+1].focus();
      else form.dispatchEvent(new Event('submit'));
    }
  });
});
</script>
</body>
</html>
