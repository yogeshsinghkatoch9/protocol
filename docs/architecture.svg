<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ADC6FF"/>
      <stop offset="100%" stop-color="#4B8EFF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c24"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#E5E2E1" font-size="28" font-weight="800" letter-spacing="6">PROTOCOL</text>
  <text x="600" y="74" text-anchor="middle" fill="#8B90A0" font-size="12" letter-spacing="3">PLATFORM ARCHITECTURE</text>

  <!-- ═══ USER LAYER ═══ -->
  <rect x="440" y="100" width="320" height="56" rx="28" fill="url(#blueGrad)" filter="shadow"/>
  <text x="600" y="133" text-anchor="middle" fill="#001a41" font-size="14" font-weight="700">USER (Athlete / Coach)</text>

  <!-- Arrow down -->
  <line x1="600" y1="156" x2="600" y2="186" stroke="#ADC6FF" stroke-width="2" opacity="0.4"/>
  <polygon points="594,182 606,182 600,192" fill="#ADC6FF" opacity="0.5"/>

  <!-- ═══ FRONTEND ═══ -->
  <rect x="340" y="192" width="520" height="80" rx="16" fill="url(#cardGrad)" stroke="#414755" stroke-width="0.5" stroke-opacity="0.3" filter="shadow"/>
  <text x="600" y="218" text-anchor="middle" fill="#ADC6FF" font-size="11" font-weight="600" letter-spacing="2">FRONTEND</text>
  <text x="600" y="240" text-anchor="middle" fill="#E5E2E1" font-size="15" font-weight="600">Web App (PWA)</text>
  <text x="600" y="258" text-anchor="middle" fill="#8B90A0" font-size="11">Desktop Sidebar + Mobile Tabs · Obsidian UI · Canvas 2D Charts · Material Icons</text>

  <!-- Arrow down -->
  <line x1="600" y1="272" x2="600" y2="302" stroke="#ADC6FF" stroke-width="2" opacity="0.3"/>
  <polygon points="594,298 606,298 600,308" fill="#ADC6FF" opacity="0.4"/>

  <!-- ═══ AUTH LAYER ═══ -->
  <rect x="440" y="308" width="320" height="44" rx="12" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="600" y="335" text-anchor="middle" fill="#C1C6D7" font-size="12" font-weight="500">Auth · PBKDF2 · Session Tokens · Bearer Auth</text>

  <!-- Arrow down -->
  <line x1="600" y1="352" x2="600" y2="382" stroke="#ADC6FF" stroke-width="2" opacity="0.3"/>
  <polygon points="594,378 606,378 600,388" fill="#ADC6FF" opacity="0.4"/>

  <!-- ═══ API SERVER ═══ -->
  <rect x="300" y="388" width="600" height="64" rx="16" fill="url(#cardGrad)" stroke="#ADC6FF" stroke-width="0.5" stroke-opacity="0.15" filter="shadow"/>
  <text x="600" y="414" text-anchor="middle" fill="#ADC6FF" font-size="11" font-weight="600" letter-spacing="2">API SERVER</text>
  <text x="600" y="435" text-anchor="middle" fill="#E5E2E1" font-size="14" font-weight="600">Node.js HTTP · 85+ Routes · Port 3888</text>

  <!-- Branching arrows to service blocks -->
  <!-- Left branch -->
  <line x1="400" y1="452" x2="400" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="480" x2="160" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="480" x2="160" y2="510" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <!-- Center-left -->
  <line x1="500" y1="452" x2="500" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="480" x2="400" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="480" x2="400" y2="510" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <!-- Center -->
  <line x1="600" y1="452" x2="600" y2="510" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <!-- Center-right -->
  <line x1="700" y1="452" x2="700" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="480" x2="800" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="480" x2="800" y2="510" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <!-- Right branch -->
  <line x1="800" y1="452" x2="800" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="480" x2="1040" y2="480" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <line x1="1040" y1="480" x2="1040" y2="510" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>

  <!-- ═══ SERVICE BLOCKS ═══ -->

  <!-- Compounds & Pharma -->
  <rect x="60" y="510" width="200" height="130" rx="14" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <circle cx="88" cy="536" r="12" fill="#ADC6FF" opacity="0.15"/>
  <text x="88" y="540" text-anchor="middle" fill="#ADC6FF" font-size="12">💊</text>
  <text x="108" y="540" fill="#E5E2E1" font-size="13" font-weight="600">Compounds</text>
  <text x="80" y="560" fill="#8B90A0" font-size="10">103 compounds</text>
  <text x="80" y="575" fill="#8B90A0" font-size="10">PK engine (2-compartment)</text>
  <text x="80" y="590" fill="#8B90A0" font-size="10">Drug interactions</text>
  <text x="80" y="605" fill="#8B90A0" font-size="10">PCT calculator</text>
  <text x="80" y="620" fill="#8B90A0" font-size="10">Dose reminders</text>

  <!-- Health Tracking -->
  <rect x="300" y="510" width="200" height="130" rx="14" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <circle cx="328" cy="536" r="12" fill="#10B981" opacity="0.15"/>
  <text x="328" y="540" text-anchor="middle" fill="#10B981" font-size="12">🩸</text>
  <text x="348" y="540" fill="#E5E2E1" font-size="13" font-weight="600">Health</text>
  <text x="320" y="560" fill="#8B90A0" font-size="10">49 blood markers</text>
  <text x="320" y="575" fill="#8B90A0" font-size="10">Auto-flagging (PED ranges)</text>
  <text x="320" y="590" fill="#8B90A0" font-size="10">Trend charts</text>
  <text x="320" y="605" fill="#8B90A0" font-size="10">Lab OCR parser</text>
  <text x="320" y="620" fill="#8B90A0" font-size="10">Readiness score (0-100)</text>

  <!-- Training -->
  <rect x="540" y="510" width="200" height="130" rx="14" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <circle cx="568" cy="536" r="12" fill="#F59E0B" opacity="0.15"/>
  <text x="568" y="540" text-anchor="middle" fill="#F59E0B" font-size="12">🏋️</text>
  <text x="588" y="540" fill="#E5E2E1" font-size="13" font-weight="600">Training</text>
  <text x="560" y="560" fill="#8B90A0" font-size="10">121 exercises</text>
  <text x="560" y="575" fill="#8B90A0" font-size="10">8 workout templates</text>
  <text x="560" y="590" fill="#8B90A0" font-size="10">Sets / reps / weight / RPE</text>
  <text x="560" y="605" fill="#8B90A0" font-size="10">Volume tracking</text>
  <text x="560" y="620" fill="#8B90A0" font-size="10">AI workout suggestions</text>

  <!-- Body & Nutrition -->
  <rect x="780" y="510" width="200" height="130" rx="14" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <circle cx="808" cy="536" r="12" fill="#FF4500" opacity="0.15"/>
  <text x="808" y="540" text-anchor="middle" fill="#FF4500" font-size="12">📊</text>
  <text x="828" y="540" fill="#E5E2E1" font-size="13" font-weight="600">Body & Diet</text>
  <text x="800" y="560" fill="#8B90A0" font-size="10">Weight + moving average</text>
  <text x="800" y="575" fill="#8B90A0" font-size="10">12 body measurements</text>
  <text x="800" y="590" fill="#8B90A0" font-size="10">Progress photos</text>
  <text x="800" y="605" fill="#8B90A0" font-size="10">Macro tracking</text>
  <text x="800" y="620" fill="#8B90A0" font-size="10">Water intake</text>

  <!-- Competition & Strength -->
  <rect x="940" y="510" width="200" height="130" rx="14" fill="#1a1a22" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <circle cx="968" cy="536" r="12" fill="#ADC6FF" opacity="0.15"/>
  <text x="968" y="540" text-anchor="middle" fill="#ADC6FF" font-size="12">🏆</text>
  <text x="988" y="540" fill="#E5E2E1" font-size="13" font-weight="600">Competition</text>
  <text x="960" y="560" fill="#8B90A0" font-size="10">16 federations</text>
  <text x="960" y="575" fill="#8B90A0" font-size="10">17 divisions</text>
  <text x="960" y="590" fill="#8B90A0" font-size="10">Peak week planner</text>
  <text x="960" y="605" fill="#8B90A0" font-size="10">Wilks / DOTS / 1RM</text>
  <text x="960" y="620" fill="#8B90A0" font-size="10">20 strongman events</text>

  <!-- ═══ Converging arrows to database ═══ -->
  <line x1="160" y1="640" x2="160" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="640" x2="400" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <line x1="640" y1="640" x2="640" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <line x1="880" y1="640" x2="880" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <line x1="1040" y1="640" x2="1040" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <!-- Horizontal connector -->
  <line x1="160" y1="680" x2="1040" y2="680" stroke="#8B90A0" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="680" x2="600" y2="710" stroke="#8B90A0" stroke-width="1" opacity="0.3"/>
  <polygon points="594,706 606,706 600,716" fill="#8B90A0" opacity="0.3"/>

  <!-- ═══ DATABASE ═══ -->
  <rect x="380" y="716" width="440" height="60" rx="16" fill="url(#cardGrad)" stroke="#414755" stroke-width="0.5" stroke-opacity="0.2" filter="shadow"/>
  <text x="600" y="742" text-anchor="middle" fill="#ADC6FF" font-size="11" font-weight="600" letter-spacing="2">DATABASE</text>
  <text x="600" y="762" text-anchor="middle" fill="#E5E2E1" font-size="14" font-weight="600">SQLite · 24 Tables · protocol.db</text>

  <!-- ═══ BOTTOM FEATURES BAR ═══ -->
  <rect x="100" y="810" width="1000" height="50" rx="25" fill="#0E0E0E" stroke="#414755" stroke-width="0.5" stroke-opacity="0.15"/>

  <text x="180" y="840" text-anchor="middle" fill="#ADC6FF" font-size="10" font-weight="600">🔐 Auth</text>
  <text x="300" y="840" text-anchor="middle" fill="#10B981" font-size="10" font-weight="600">📤 Export</text>
  <text x="420" y="840" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">🏅 Achievements</text>
  <text x="540" y="840" text-anchor="middle" fill="#FF4500" font-size="10" font-weight="600">⚠️ Interactions</text>
  <text x="660" y="840" text-anchor="middle" fill="#ADC6FF" font-size="10" font-weight="600">👨‍🏫 Coach Share</text>
  <text x="780" y="840" text-anchor="middle" fill="#10B981" font-size="10" font-weight="600">🧮 Calculators</text>
  <text x="920" y="840" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">💡 AI Suggestions</text>

  <!-- Stats footer -->
  <text x="600" y="888" text-anchor="middle" fill="#414755" font-size="10" letter-spacing="2">85+ API ROUTES · 24 TABLES · 103 COMPOUNDS · 121 EXERCISES · 49 MARKERS · 1 DEPENDENCY</text>
</svg>
